<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AZURA — Меню</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #c8c5bc; color: #2c3e50; overscroll-behavior: none; }

  /* ── HEADER ── */
  .app-header {
    background: #2d4a6d;
    color: #fff;
    text-align: center;
    padding: 16px 16px 12px;
  }
  .app-header h1 { font-size: 1.6rem; letter-spacing: 8px; font-weight: 300; }
  .app-header p  { font-size: 0.65rem; letter-spacing: 3px; opacity: 0.65; margin-top: 2px; }


  /* ── LANG TOGGLE ── */
  .lang-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    gap: 2px;
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 3px;
  }
  .lang-btn {
    padding: 4px 10px;
    border: none;
    border-radius: 16px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    color: rgba(255,255,255,0.6);
    background: transparent;
    transition: all 0.2s;
  }
  .lang-btn.active {
    background: #fff;
    color: #2d4a6d;
  }
  .app-header { position: relative; }

  /* ── SECTION TABS ── */
  .section-tabs {
    display: flex;
    background: #1e3550;
    border-bottom: 2px solid #0f2035;
  }
  .section-tab {
    flex: 1;
    padding: 13px 4px;
    text-align: center;
    font-size: 0.78rem;
    letter-spacing: 1.5px;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
    text-transform: uppercase;
    user-select: none;
    border: none;
    background: transparent;
  }
  .section-tab.active {
    color: #fff;
    background: #2d4a6d;
    border-bottom: 3px solid #7fb3e8;
    margin-bottom: -2px;
  }

  /* ── SECTION PANELS ── */
  .section-panel { display: none; }
  .section-panel.active { display: block; }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0,0,0,0.92);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 100%;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #lightbox-close {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 2rem;
    color: #fff;
    cursor: pointer;
    line-height: 1;
    opacity: 0.8;
  }

  /* ── CONTROLS (search + category filter) ── */
  #fixed-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
  }
  .controls {
    background: #b8b5ac;
    padding: 10px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  #page-content {
    padding-top: 0; /* set by JS */
  }
  .search-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .search-row input {
    flex: 1;
    padding: 9px 14px;
    border: none;
    border-radius: 22px;
    font-size: 0.9rem;
    background: #f5f3ef;
    outline: none;
    min-width: 0;
  }
  .count-badge {
    font-size: 0.72rem;
    color: #555;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .cat-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-btn {
    padding: 6px 12px;
    border: 1.5px solid #2d4a6d;
    border-radius: 16px;
    background: transparent;
    color: #2d4a6d;
    cursor: pointer;
    font-size: 0.72rem;
    letter-spacing: 0.4px;
    transition: all 0.18s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .cat-btn.active, .cat-btn:active { background: #2d4a6d; color: #fff; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px;
  }
  @media (max-width: 360px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* ── CARD ── */
  .card {
    background: #f0ede7;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    active-transform: scale(0.98);
  }
  .card:active { transform: scale(0.97); }
  .card img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    background: #d5d2cb;
    display: block;
  }
  .card-body {
    padding: 9px 10px 10px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .card-cat  { font-size: 0.58rem; letter-spacing: 1.2px; color: #2d4a6d; font-weight: 700; text-transform: uppercase; }
  .card-name { font-size: 0.84rem; font-weight: 700; color: #1a2b3c; line-height: 1.3; }
  .card-meta { font-size: 0.78rem; color: #2d4a6d; font-weight: 600; display: flex; align-items: baseline; gap: 4px; }
  .card-vol  { font-size: 0.65rem; color: #888; font-weight: 400; }
  .card-grapes {
    font-size: 0.68rem;
    color: #7a5c2e;
    font-style: italic;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .card-desc {
    font-size: 0.72rem;
    color: #555;
    margin-top: 5px;
    line-height: 1.5;
    border-top: 1px solid #ddd;
    padding-top: 5px;
    flex: 1;
  }

  /* ── EMPTY STATE ── */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: #888;
    font-size: 0.95rem;
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }

  /* ── WINE SECTION extras ── */
  .wine-card .card img { height: 160px; object-fit: contain; padding: 8px; background: #f5f2ea; }

  /* ── KITCHEN / WINE placeholder ── */
  .coming-soon {
    text-align: center;
    padding: 60px 24px;
    color: #666;
  }
  .coming-soon .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.35; }
  .coming-soon h3 { font-size: 1rem; font-weight: 600; color: #2d4a6d; margin-bottom: 8px; }
  .coming-soon p  { font-size: 0.82rem; line-height: 1.6; }
</style>
</head>
<body>

<div id="fixed-header">
  <div class="app-header">
    <h1>AZURA</h1>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-ru" onclick="setLang('ru')">RU</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <p id="header-subtitle">СПРАВОЧНИК ДЛЯ ОФИЦИАНТОВ</p>
  </div>
  <div class="section-tabs">
    <button class="section-tab" id="tab-kitchen" data-section="kitchen" onclick="switchSection('kitchen')">🍽 Кухня</button>
    <button class="section-tab active" id="tab-bar" data-section="bar" onclick="switchSection('bar')">🍹 Бар</button>
    <button class="section-tab" id="tab-wine" data-section="wine" onclick="switchSection('wine')">🍷 Вино</button>
    <button class="section-tab" id="tab-cocktails" data-section="cocktails" onclick="switchSection('cocktails')">🍸 Коктейли</button>
  </div>
  <div class="controls" id="ctrl-kitchen" style="display:none">
    <div class="search-row">
      <input type="search" id="search-kitchen" placeholder="🔍 Поиск по блюдам..." oninput="renderSection('kitchen', this.value)" autocomplete="off">
      <span class="count-badge" id="count-kitchen"></span>
    </div>
    <div class="cat-scroll" id="cats-kitchen"></div>
  </div>
  <div class="controls" id="ctrl-bar">
    <div class="search-row">
      <input type="search" id="search-bar" placeholder="🔍 Поиск по напиткам..." oninput="renderSection('bar', this.value)" autocomplete="off">
      <span class="count-badge" id="count-bar"></span>
    </div>
    <div class="cat-scroll" id="cats-bar"></div>
  </div>
  <div class="controls" id="ctrl-wine" style="display:none">
    <div class="search-row">
      <input type="search" id="search-wine" placeholder="🔍 Поиск по вину..." oninput="renderSection('wine', this.value)" autocomplete="off">
      <span class="count-badge" id="count-wine"></span>
    </div>
    <div class="cat-scroll" id="cats-wine"></div>
  </div>
  <div class="controls" id="ctrl-cocktails" style="display:none">
    <div class="search-row">
      <input type="search" id="search-cocktails" placeholder="🔍 Поиск по коктейлям..." oninput="renderSection('cocktails', this.value)" autocomplete="off">
      <span class="count-badge" id="count-cocktails"></span>
    </div>
    <div class="cat-scroll" id="cats-cocktails"></div>
  </div>
</div><!-- /fixed-header -->

<div id="page-content">
  <div class="section-panel" id="panel-kitchen">
    <div class="grid" id="grid-kitchen"></div>
  </div>
  <div class="section-panel active" id="panel-bar">
    <div class="grid" id="grid-bar"></div>
  </div>
  <div class="section-panel" id="panel-wine">
    <div class="grid" id="grid-wine"></div>
  </div>
  <div class="section-panel" id="panel-cocktails">
    <div class="grid" id="grid-cocktails"></div>
  </div>
</div>

function catLabel(cat) { if (cat === 'all') return LANG==='en' ? 'All' : 'Все'; return (LANG==='en' && CAT_EN[cat]) ? CAT_EN[cat] : cat; }
// Extract grape variety from end of description: "...text. (Chardonnay, Pinot Noir)"
function extractGrapes(desc) {
  if (!desc) return '';
  const m = desc.match(/\(([^)]+)\)\s*$/);
  return m ? m[1] : '';
}
function stripGrapes(desc) {
  if (!desc) return '';
  return desc.replace(/\s*\([^)]+\)\s*$/, '').trim();
}
function itemName(i)  {
  if (LANG==='en') return i.name_en || i.name;   // kitchen→name_en, cocktails→name(EN), bar/wine→name
  return i.name_ru || i.name;                     // cocktails→name_ru, kitchen/bar/wine→name(RU)
}
function itemDesc(i)  {
  if (LANG==='en') return i.desc_en || i.desc;   // kitchen/wine→desc_en, cocktails→desc(EN)
  return i.desc_ru || i.desc;                     // cocktails→desc_ru, kitchen/wine→desc(RU)
}

const TAB_LABELS = {
  kitchen:   { ru: '🍽 Кухня',    en: '🍽 Kitchen' },
  bar:       { ru: '🍹 Бар',      en: '🍹 Bar' },
  wine:      { ru: '🍷 Вино',     en: '🍷 Wine' },
  cocktails: { ru: '🍸 Коктейли', en: '🍸 Cocktails' },
};
const SEARCH_PH = {

  bar:       { ru: '🔍 Поиск по напиткам...',  en: '🔍 Search drinks...' },
  wine:      { ru: '🔍 Поиск по вину...',       en: '🔍 Search wines...' },
  cocktails: { ru: '🔍 Поиск по коктейлям...', en: '🔍 Search cocktails...' },
};
function updateTabLabels() {
  ['kitchen','bar','wine','cocktails'].forEach(sec => {
    const tab = document.getElementById('tab-' + sec);
    if (tab) tab.textContent = TAB_LABELS[sec][LANG] || TAB_LABELS[sec].ru;
    const inp = document.getElementById('search-' + sec);
    if (inp) inp.placeholder = SEARCH_PH[sec][LANG] || SEARCH_PH[sec].ru;
  });
}
function setLang(lang) {
  LANG = lang;
  document.getElementById('btn-ru').classList.toggle('active', lang==='ru');
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  const sub = document.getElementById('header-subtitle');
  if (sub) sub.textContent = lang==='en' ? "WAITER'S GUIDE" : 'СПРАВОЧНИК ДЛЯ ОФИЦИАНТОВ';
  updateTabLabels();
  // re-render ALL sections so switching tabs always shows correct language
  ['kitchen', 'bar', 'wine', 'cocktails'].forEach(sec => renderSection(sec));
}

const US = id => `https://s3.us-west-2.amazonaws.com/images.unsplash.com/small/${id}`;
const FALLBACK = "https://images.unsplash.com/photo-1574096079513-d8259312b785?w=400&q=80&auto=format&fit=crop";

    desc:'Clean, sharp, and refined with delicate herbal notes and a smooth finish.\n🍶 Belvedere · Cocchi Extra Dry · Bitter Truth Orange Bitter', desc_ru:'Чистый, чёткий и утончённый с деликатными травяными нотами и гладким финишем.\n🍶 Belvedere · Cocchi Extra Dry · Bitter Truth Orange Bitter' },

    desc:'Savory and bold — spiced tomato with citrus and vodka, perfect for any time of day.\n🍶 Tomato Juice · Alambra juice · Worcestershire sauce · HM Honey Syrup · Tabasco smoked · Tabasco green · Smoked Salt · Black pepper · Lemon juice', desc_ru:'Пряная и насыщенная — острый томат с цитрусом и водкой, идеальна в любое время дня.\n🍶 Tomato Juice · Alambra juice · Worcestershire sauce · HM Honey Syrup · Tabasco smoked · Tabasco green · Smoked Salt · Black pepper · Lemon juice' },

const DATA = { kitchen: kitchenItems, bar: barItems, wine: wineItems, cocktails: cocktailItems };
const state = {
  kitchen:   { cat: "all" },
  bar:       { cat: "all" },
  wine:      { cat: "all" },
  cocktails: { cat: "all" },
};
let activeSection = "bar";

function switchSection(sec) {
  activeSection = sec;
  // toggle panels
  document.querySelectorAll(".section-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".section-tab").forEach(t => t.classList.remove("active"));
  // show only the controls for this section
  document.querySelectorAll(".controls").forEach(c => c.style.display = "none");
  document.getElementById("panel-" + sec).classList.add("active");
  document.querySelector(`[data-section="${sec}"]`).classList.add("active");
  const ctrl = document.getElementById("ctrl-" + sec);
  if (ctrl) ctrl.style.display = "block";
  fixOffsets();
  // scroll to top
  window.scrollTo({ top: 0, behavior: "smooth" });
  renderSection(sec, "");
  // clear search input for this section
  const inp = document.getElementById('search-' + sec);
  if (inp) inp.value = "";
}

function buildCats(sec) {
  const items = DATA[sec];
  const cats = ["all", ...new Set(items.map(i => i.cat))];
  const el = document.getElementById("cats-" + sec);
  if (!el) return;
  el.innerHTML = cats.map(c =>
    `<button class="cat-btn${c === state[sec].cat ? " active" : ""}"
      onclick="setcat('${sec}','${c.replace(/'/g, "\\'")}') ">${c}</button>`
  ).join("");
}

function setcat(sec, c) {
  state[sec].cat = c;
  buildCats(sec);
  const inp = document.getElementById('search-' + sec);
  renderSection(sec, inp ? inp.value : "");
}

function renderSection(sec, filter = "") {
  const items = DATA[sec];
  const grid  = document.getElementById("grid-" + sec);
  const countEl = document.getElementById("count-" + sec);
  if (!grid) return;

  if (items.length === 0) {
    grid.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">${sec === "kitchen" ? "🍽" : "🍷"}</div>
        <div style="font-weight:600;color:#2d4a6d;margin-bottom:8px">${LANG==='en' ? 'Section coming soon' : 'Раздел в разработке'}</div>
        <div style="font-size:0.8rem;color:#888">${LANG==='en' ? 'Send us the menu — we\'ll add it!' : 'Пришли список позиций — добавим!'}</div>
      </div>`;
    if (countEl) countEl.textContent = "";
    buildCats(sec);
    return;
  }

  const f = filter.toLowerCase();
  const visible = items.filter(i =>
    (state[sec].cat === "all" || i.cat === state[sec].cat) &&
    (i.name.toLowerCase().includes(f) || i.desc.toLowerCase().includes(f) || i.cat.toLowerCase().includes(f) ||
     (i.name_en||'').toLowerCase().includes(f) || (i.desc_en||'').toLowerCase().includes(f) ||
     (i.name_ru||'').toLowerCase().includes(f) || (i.desc_ru||'').toLowerCase().includes(f))
  );
  if (countEl) countEl.textContent = visible.length + (LANG==='en' ? " items" : " поз.");

  if (!visible.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🔍</div>${LANG==='en' ? 'Nothing found' : 'Ничего не найдено'}</div>`;
    return;
  }

  grid.innerHTML = visible.map(i => `
    <div class="card${sec === "wine" ? " wine-card" : ""}">
      ${i.img
        ? `<img src="${i.img}" alt="${i.name}" loading="lazy" onerror="this.src='${FALLBACK}'" onclick="openLightbox(this.src)" style="cursor:zoom-in">`
        : `<div style="width:100%;height:130px;background:#dedad4;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:1.6rem;">📷</div>`
      }
      <div class="card-body">
        <div class="card-cat">${catLabel(i.cat)}</div>
        <div class="card-name">${itemName(i)}</div>
        <div class="card-meta">${i.price}${i.vol ? `<span class="card-vol">&nbsp;·&nbsp;${i.vol}</span>` : ""}</div>
        ${sec === 'wine' && extractGrapes(itemDesc(i)) ? `<div class="card-grapes">🍇 ${extractGrapes(itemDesc(i))}</div>` : ''}
        <div class="card-desc">${sec === 'wine' ? stripGrapes(itemDesc(i)) : itemDesc(i)}</div>
      </div>
    </div>
  `).join("");

  buildCats(sec);
}

// ── Adjust page-content top padding to match fixed header height ──
function fixOffsets() {
  const fh = document.getElementById('fixed-header');
  const pc = document.getElementById('page-content');
  if (fh && pc) pc.style.paddingTop = fh.offsetHeight + 'px';
}
window.addEventListener('load', fixOffsets);
window.addEventListener('resize', fixOffsets);

// ── Lightbox ──
function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-img').src = src;
  lb.classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ── Init ──
["kitchen", "bar", "wine", "cocktails"].forEach(sec => renderSection(sec, ""));
// Ensure only bar controls visible on start (bar is active by default)
document.querySelectorAll(".controls").forEach(c => c.style.display = "none");
const initCtrl = document.getElementById("ctrl-bar");
if (initCtrl) initCtrl.style.display = "block";
</script>
<div id="lightbox" onclick="closeLightbox()">
  <span id="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightbox-img" src="" alt="">
</div>
</body>
